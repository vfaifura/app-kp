<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#000175">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="КПДІ Campus">
  <meta name="description" content="КПДІ Campus — мобільний додаток Кам'янець-Подільського державного інституту">
  <title>КПДІ Campus</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0C1119; overscroll-behavior: none; }
    body {
      font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
      color: #E8EDF2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    a { text-decoration: none; color: inherit; }
    button { background: none; border: none; cursor: pointer; font-family: inherit; color: inherit; -webkit-tap-highlight-color: transparent; }
    input, textarea { font-family: inherit; }
    input:focus, textarea:focus { outline: none; }

    /* === APP LAYOUT === */
    /* position:fixed with inset-0 is the only reliable way to fill
       the exact visual viewport on iOS Safari (avoids height:100% chain breakage) */
    #root {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #0C1119;
    }
    .app {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      max-width: 430px;
      width: 100%;
      margin: 0 auto;
      background: #0C1119;
      padding-top: env(safe-area-inset-top);
    }
    .app-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* === TAB CONTENT === */
    .tab-content { padding: 20px 16px 16px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === BOTTOM NAV === */
    /* Not position:fixed — avoids iOS Safari stacking context bugs */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      padding-bottom: env(safe-area-inset-bottom);
      min-height: calc(66px + env(safe-area-inset-bottom));
      background: rgba(12, 17, 25, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 4px;
      min-height: 44px;
      position: relative;
      color: #5C6F82;
      transition: color 0.2s;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .nav-btn.active { color: #fff; }
    .nav-btn.active svg { stroke: #fff; }
    .nav-indicator {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      background: #000175;
      border-radius: 0 0 3px 3px;
    }

    /* === CARDS === */
    .card {
      background: #151D2B;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 16px;
      margin-bottom: 10px;
    }

    /* === SECTION HEADER === */
    .section-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #3A3AAF;
      margin-bottom: 10px;
      margin-top: 6px;
    }

    /* === BUTTONS === */
    .btn-primary {
      background: #000175;
      color: #fff;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.18s, opacity 0.18s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      white-space: nowrap;
    }
    .btn-primary:hover  { background: #3A3AAF; }
    .btn-primary:active { background: #00014A; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; background: #000175; }
    .btn-full { width: 100%; }

    /* === HOME TAB === */
    .home-hero {
      text-align: center;
      padding: 28px 0 22px;
    }
    .home-logo-img {
      display: block;
      width: 160px;
      height: auto;
      margin: 0 auto 14px;
      object-fit: contain;
    }
    .home-subtitle {
      font-size: 13px;
      color: #8899AA;
      line-height: 1.55;
      max-width: 260px;
      margin: 0 auto;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .quick-card {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      min-height: 82px;
      text-align: left;
    }
    .quick-card:active { background: #1C2740; border-color: rgba(255,255,255,0.1); }
    .quick-card-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #000175;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quick-card-icon svg { stroke: #fff; }
    .quick-card-label {
      font-size: 13px;
      font-weight: 600;
      color: #E8EDF2;
    }
    .official-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #4EA8DE;
      transition: background 0.18s;
      cursor: pointer;
    }
    .official-link:active { background: #1C2740; }
    .contact-summary {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .contact-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #8899AA;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-row svg { flex-shrink: 0; margin-top: 1px; }

    /* === SCHEDULE TAB === */
    .clock-block {
      text-align: center;
      padding: 18px 0 20px;
    }
    .clock-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      color: #E8EDF2;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .day-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .day-badge.weekday { background: rgba(0,1,117,0.18); color: #4EA8DE; }
    .day-badge.weekend { background: rgba(240,86,106,0.14); color: #F0566A; }
    .day-name { font-size: 13px; color: #8899AA; margin-top: 3px; }

    .active-banner {
      background: rgba(0,1,117,0.22);
      border: 1px solid rgba(0,1,117,0.5);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .active-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #4EA8DE;
      margin-bottom: 4px;
    }
    .active-info {
      font-size: 15px;
      font-weight: 600;
      color: #E8EDF2;
      margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
    }
    .progress-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #000175;
      border-radius: 2px;
      transition: width 1s linear;
    }

    .shift-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .shift-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      color: #8899AA;
      transition: all 0.18s;
      cursor: pointer;
      min-height: 44px;
    }
    .shift-btn.active { background: #000175; border-color: #000175; color: #fff; }

    .period-list { display: flex; flex-direction: column; gap: 4px; }

    .period-class {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      transition: all 0.2s;
    }
    .period-class.active-period {
      background: rgba(0,1,117,0.12);
      border-color: rgba(0,1,117,0.28);
    }
    .period-class.done-period {
      background: rgba(255,255,255,0.015);
      border-color: rgba(255,255,255,0.04);
    }

    .period-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      color: #E8EDF2;
    }
    .period-class.active-period .period-num { background: #000175; color: #fff; }
    .period-class.done-period .period-num { background: rgba(45,212,168,0.12); color: #2DD4A8; }
    .period-class.done-period .period-name {
      text-decoration: line-through;
      text-decoration-color: rgba(45,212,168,0.35);
      color: #5C6F82;
    }
    .period-class.done-period .period-time { color: #3A4A5C; }

    .period-body { flex: 1; min-width: 0; }
    .period-name { font-size: 14px; font-weight: 600; color: #E8EDF2; margin-bottom: 2px; }
    .period-time {
      font-size: 12px;
      color: #8899AA;
      font-family: 'JetBrains Mono', monospace;
    }
    .mini-progress-bg {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 7px;
    }
    .mini-progress-fill {
      height: 100%;
      background: #4EA8DE;
      border-radius: 2px;
      transition: width 1s linear;
    }

    .period-break {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 14px;
    }
    .break-label { font-size: 12px; color: #FFA94D; font-weight: 500; }
    .break-time {
      font-size: 11px;
      color: #5C6F82;
      font-family: 'JetBrains Mono', monospace;
    }
    .period-break.done-break { opacity: 0.28; }

    /* === MOODLE TAB === */
    .moodle-hero {
      text-align: center;
      padding: 28px 0 20px;
    }
    .moodle-logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: #F98012;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 14px;
      letter-spacing: -0.04em;
    }
    .moodle-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .moodle-sub { font-size: 13px; color: #8899AA; }
    .moodle-btn-wrap { margin-bottom: 16px; }
    .moodle-link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #000175;
      color: #fff;
      border-radius: 12px;
      padding: 15px 20px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.18s;
      cursor: pointer;
      min-height: 52px;
      text-decoration: none;
    }
    .moodle-link-btn:active { background: #3A3AAF; }
    .moodle-features {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
    }
    .moodle-feature-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .moodle-feature-row:last-child { border-bottom: none; }
    .moodle-feature-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .moodle-feature-text { font-size: 14px; color: #C8D4DF; }

    /* === CAFETERIA TAB === */
    .menu-cat-header {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin: 16px 0 8px 2px;
    }
    .menu-status {
      font-size: 14px;
      color: #8899AA;
      text-align: center;
      padding: 32px 0;
    }
    .menu-item-card {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .menu-cat {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #5C6F82;
      margin-bottom: 4px;
    }
    .menu-item-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .menu-name { font-size: 14px; color: #E8EDF2; flex: 1; }
    .menu-price {
      font-size: 14px;
      font-weight: 700;
      color: #2DD4A8;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .sheets-connector {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 4px;
    }
    .connector-title {
      font-size: 12px;
      font-weight: 600;
      color: #8899AA;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }
    .connector-row { display: flex; gap: 8px; }
    .sheets-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #E8EDF2;
      min-width: 0;
      transition: border-color 0.18s;
    }
    .sheets-input:focus { border-color: rgba(0,1,117,0.55); }
    .sheets-input::placeholder { color: #5C6F82; }
    .sheet-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sheet-status.success { background: rgba(45,212,168,0.1); color: #2DD4A8; }
    .sheet-status.error   { background: rgba(240,86,106,0.1); color: #F0566A; }
    .sheet-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 12px; }
    .sheet-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sheet-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #5C6F82;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    .sheet-table td {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #E8EDF2;
    }
    .sheet-table tr:last-child td { border-bottom: none; }
    .sheet-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .sheet-connected-label { font-size: 12px; color: #2DD4A8; font-weight: 600; }
    .sheet-disconnect {
      font-size: 11px;
      color: #5C6F82;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: none;
      font-family: 'Montserrat', sans-serif;
      transition: color 0.18s;
    }
    .sheet-disconnect:hover { color: #F0566A; }

    /* === CONTACT TAB === */
    .contact-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: background 0.18s;
      cursor: pointer;
      text-decoration: none;
    }
    .contact-card:active { background: #1C2740; }
    .contact-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-card-info { flex: 1; min-width: 0; }
    .contact-card-label { font-size: 11px; color: #5C6F82; margin-bottom: 2px; }
    .contact-card-value { font-size: 14px; color: #E8EDF2; font-weight: 500; line-height: 1.35; }

    /* === CONTACT FORM === */
    .contact-form {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: #8899AA; }
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 14px;
      color: #E8EDF2;
      width: 100%;
      transition: border-color 0.18s;
    }
    .form-input:focus { border-color: rgba(0,1,117,0.55); }
    .form-input::placeholder { color: #5C6F82; }
    .form-textarea { resize: none; min-height: 96px; }

    .success-card {
      background: #151D2B;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 36px 16px;
      text-align: center;
      margin-bottom: 10px;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(45,212,168,0.14);
      color: #2DD4A8;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .success-title { font-size: 18px; font-weight: 700; color: #2DD4A8; margin-bottom: 6px; }
    .success-sub { font-size: 13px; color: #8899AA; }

    /* === INSTALL BANNER === */
    /* Sits above the bottom nav (66px) + home indicator + gap */
    .install-banner {
      position: fixed;
      bottom: calc(66px + env(safe-area-inset-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      max-width: 406px;
      background: #1A2540;
      border: 1px solid rgba(0,1,117,0.28);
      border-radius: 14px;
      padding: 12px 12px 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(10px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    .install-content { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .install-icon { flex-shrink: 0; }
    .install-icon img { border-radius: 10px; display: block; }
    .install-text { flex: 1; min-width: 0; }
    .install-title { font-size: 13px; font-weight: 700; color: #E8EDF2; margin-bottom: 2px; }
    .install-sub { font-size: 11px; color: #8899AA; line-height: 1.4; }
    .install-btn { padding: 8px 14px; font-size: 12px; border-radius: 8px; flex-shrink: 0; }
    .install-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      color: #8899AA;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Capture beforeinstallprompt BEFORE React loads — the event fires early -->
  <script>
    window._installPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {

    const DAY_NAMES_FULL = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', "П'ятниця", 'Субота'];

    // ─── HELPERS ─────────────────────────────────────────────────────────────

    function parseTime(str) {
      const [h, m] = str.split(':').map(Number);
      return h * 60 + m;
    }

    function getItemState(item, date, isWeekend) {
      if (isWeekend) return 'upcoming';
      const mins = date.getHours() * 60 + date.getMinutes();
      const s = parseTime(item.start);
      const e = parseTime(item.end);
      if (mins >= e) return 'done';
      if (mins >= s) return 'active';
      return 'upcoming';
    }

    function getProgress(item, date) {
      const mins = date.getHours() * 60 + date.getMinutes() + date.getSeconds() / 60;
      const s = parseTime(item.start);
      const e = parseTime(item.end);
      return Math.min(100, Math.max(0, ((mins - s) / (e - s)) * 100));
    }

    function findActiveItem(items, date, isWeekend) {
      if (isWeekend) return null;
      const mins = date.getHours() * 60 + date.getMinutes();
      for (const item of items) {
        if (mins >= parseTime(item.start) && mins < parseTime(item.end)) return item;
      }
      return null;
    }

    function pad2(n) { return String(n).padStart(2, '0'); }

    // ─── SVG ICONS ───────────────────────────────────────────────────────────

    const svgProps = (w, h) => ({
      width: w, height: h,
      viewBox: `0 0 24 24`,
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: 2,
      strokeLinecap: 'round',
      strokeLinejoin: 'round',
    });

    function IconHome()     { return ce('svg', svgProps(22,22), ce('path',{d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'}), ce('polyline',{points:'9,22 9,12 15,12 15,22'})); }
    function IconBell()     { return ce('svg', svgProps(22,22), ce('path',{d:'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9'}), ce('path',{d:'M13.73 21a2 2 0 01-3.46 0'})); }
    function IconBook()     { return ce('svg', svgProps(22,22), ce('path',{d:'M4 19.5A2.5 2.5 0 016.5 17H20'}), ce('path',{d:'M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z'})); }
    function IconFork()     { return ce('svg', svgProps(22,22), ce('path',{d:'M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2'}), ce('path',{d:'M7 2v20'}), ce('path',{d:'M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7'})); }
    function IconUser()     { return ce('svg', svgProps(22,22), ce('path',{d:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2'}), ce('circle',{cx:12,cy:7,r:4})); }
    function IconPin(p)     { return ce('svg', {...svgProps(16,16), stroke: p.color||'currentColor'}, ce('path',{d:'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z'}), ce('circle',{cx:12,cy:10,r:3})); }
    function IconPhone(p)   { return ce('svg', {...svgProps(16,16), stroke: p.color||'currentColor'}, ce('path',{d:'M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.81 19.79 19.79 0 012 2.18 2 2 0 014 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14z'})); }
    function IconMail(p)    { return ce('svg', {...svgProps(16,16), stroke: p.color||'currentColor'}, ce('path',{d:'M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z'}), ce('polyline',{points:'22,6 12,13 2,6'})); }
    function IconExternal() { return ce('svg', svgProps(14,14), ce('path',{d:'M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6'}), ce('polyline',{points:'15,3 21,3 21,9'}), ce('line',{x1:10,y1:14,x2:21,y2:3})); }
    function IconChevron()  { return ce('svg', {...svgProps(16,16), stroke:'#5C6F82'}, ce('polyline',{points:'9,18 15,12 9,6'})); }
    function IconCheck()    { return ce('svg', {...svgProps(14,14), stroke:'#2DD4A8', strokeWidth:3}, ce('polyline',{points:'20,6 9,17 4,12'})); }
    function IconGlobe()    { return ce('svg', svgProps(18,18), ce('circle',{cx:12,cy:12,r:10}), ce('line',{x1:2,y1:12,x2:22,y2:12}), ce('path',{d:'M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z'})); }

    // ─── HOME TAB ────────────────────────────────────────────────────────────

          ce('p', { className: 'home-subtitle' }, "Кам'янець-Подільський державний інститут")
        ),

        ce('div', { className: 'quick-grid' },

            { label: 'Розклад дзвінків', tab: 1, icon: IconBell },

            { label: 'Їдальня',          tab: 3, icon: IconFork },
            { label: 'Контакти',         tab: 4, icon: IconUser },
          ].map(({ label, tab, icon: Icon }) =>
            ce('button', { key: label, className: 'quick-card', onClick: () => onTabChange(tab) },
              ce('div', { className: 'quick-card-icon' }, ce(Icon)),
              ce('span', { className: 'quick-card-label' }, label)
            )
          )
        ),

        ce('a', {
          className: 'official-link',
          href: 'https://kpdi.edu.ua',
          target: '_blank',
          rel: 'noopener noreferrer',
        },
          ce('span', null, 'Офіційний сайт'),
          ce(IconExternal)
        ),

        ce('div', { className: 'contact-summary' },
          ce('div', { className: 'contact-row' },
            ce(IconPin, { color: '#4EA8DE' }),
            ce('span', null, "вулиця Годованця, 13, Кам'янець-Подільський, 32301")
          ),
          ce('div', { className: 'contact-row' },
            ce(IconPhone, { color: '#2DD4A8' }),
            ce('span', null, '(03849) 3-26-51')
          ),
          ce('div', { className: 'contact-row' },
            ce(IconPhone, { color: '#2DD4A8' }),
            ce('span', null, '(068) 176-96-17')
          ),
          ce('div', { className: 'contact-row' },
            ce(IconMail, { color: '#FFA94D' }),
            ce('span', null, 'info@kpdi.edu.ua')
          ),
        )
      );
    }

    // ─── SCHEDULE TAB ────────────────────────────────────────────────────────

    function ScheduleTab() {
      const [now, setNow] = useState(new Date());
      const [shift, setShift] = useState(0);

      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      const day = now.getDay();
      const isWeekend = day === 0 || day === 6;
      const periods = shift === 0 ? SHIFT_I : SHIFT_II;
      const activeItem = findActiveItem(periods, now, isWeekend);

      const clockStr = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;

      return ce('div', { className: 'tab-content' },
        ce('div', { className: 'clock-block' },
          ce('div', { className: 'clock-display' }, clockStr),
          ce('div', { className: isWeekend ? 'day-badge weekend' : 'day-badge weekday' },
            isWeekend ? 'Вихідний' : 'Навчальний день'
          ),
          ce('div', { className: 'day-name' }, DAY_NAMES_FULL[day])
        ),

        activeItem && ce('div', { className: 'active-banner' },
          ce('div', { className: 'active-label' }, 'Зараз'),
          ce('div', { className: 'active-info' },
            activeItem.type === 'class'
              ? `${activeItem.num} пара · ${activeItem.start}–${activeItem.end}`
              : `${activeItem.label} · ${activeItem.start}–${activeItem.end}`
          ),
          ce('div', { className: 'progress-bar-bg' },
            ce('div', { className: 'progress-bar-fill', style: { width: `${getProgress(activeItem, now)}%` } })
          )
        ),

        ce('div', { className: 'shift-toggle' },
          ce('button', {
            className: shift === 0 ? 'shift-btn active' : 'shift-btn',
            onClick: () => setShift(0),
          }, 'Зміна I · Коледж'),
          ce('button', {
            className: shift === 1 ? 'shift-btn active' : 'shift-btn',
            onClick: () => setShift(1),
          }, 'Зміна II · Інститут'),
        ),

        ce('div', { className: 'period-list' },
          periods.map((item, i) => {
            if (item.type === 'break') {
              const bs = getItemState(item, now, isWeekend);
              return ce('div', { key: i, className: bs === 'done' ? 'period-break done-break' : 'period-break' },
                ce('span', { className: 'break-label' }, item.label),
                ce('span', { className: 'break-time' }, `${item.start} – ${item.end}`)
              );
            }
            const state = getItemState(item, now, isWeekend);
            const cls = [
              'period-class',
              state === 'active' ? 'active-period' : '',
              state === 'done'   ? 'done-period'   : '',
            ].join(' ');
            return ce('div', { key: i, className: cls },
              ce('div', { className: 'period-num' },
                state === 'done' ? ce(IconCheck) : String(item.num)
              ),
              ce('div', { className: 'period-body' },
                ce('div', { className: 'period-name' }, `${item.num} пара`),
                ce('div', { className: 'period-time' }, `${item.start} – ${item.end}`),
                state === 'active' && ce('div', { className: 'mini-progress-bg' },
                  ce('div', { className: 'mini-progress-fill', style: { width: `${getProgress(item, now)}%` } })
                )
              )
            );
          })
        )
      );
    }

    // ─── MOODLE TAB ──────────────────────────────────────────────────────────

      return ce('div', { className: 'tab-content' },

              ce('span', { className: 'moodle-feature-text' }, label)
            )
          )
        )
      );

    // ─── CAFETERIA TAB ───────────────────────────────────────────────────────

    const MENU_CATS = ['1 страва', '2 страва', 'Інше'];
    const MENU_CAT_COLORS = { '1 страва': '#4EA8DE', '2 страва': '#FFA94D', 'Інше': '#2DD4A8' };

    function CafeteriaTab() {
      const [rows, setRows]     = useState(null);
      const [status, setStatus] = useState('loading'); // 'loading'|'ok'|'error'|'no-sheet'
      const [error, setError]   = useState('');

      useEffect(() => {
        if (!SHEET_ID) { setStatus('no-sheet'); return; }
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
        fetch(url)
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
          .then(text => {
            const all = text.trim().split('\n').map(r =>
              r.split(',').map(c => c.trim().replace(/^"|"$/g, ''))
            );
            setRows(all.slice(1).filter(r => r[0] && r[1])); // skip header, skip empty
            setStatus('ok');
          })
          .catch(err => { setError(err.message); setStatus('error'); });
      }, []);

      return ce('div', { className: 'tab-content' },
        ce('div', { className: 'section-header', style: { marginTop: 0 } }, 'Меню їдальні · сьогодні'),

        status === 'loading' && ce('div', { className: 'menu-status' }, 'Завантаження…'),

        status === 'no-sheet' && ce('div', { className: 'card', style: { color: '#8899AA' } },
          ce('div', { style: { fontSize: 14, marginBottom: 6 } }, 'Таблицю не підключено'),
          ce('div', { style: { fontSize: 12, color: '#5C6F82', lineHeight: 1.5 } },
            'Встановіть SHEET_ID у коді. Знайдіть рядок «const SHEET_ID» та вставте ID вашої таблиці.'
          )
        ),

        status === 'error' && ce('div', { className: 'sheet-status error', style: { margin: 0 } },
          `Помилка завантаження: ${error}`
        ),

        status === 'ok' && rows && ce('div', null,
          MENU_CATS.map(cat => {
            const items = rows.filter(r => r[0] === cat);
            if (!items.length) return null;
            return ce('div', { key: cat },
              ce('div', { className: 'menu-cat-header', style: { color: MENU_CAT_COLORS[cat] } }, cat),
              items.map((row, i) =>
                ce('div', { key: i, className: 'menu-item-card' },
                  ce('div', { className: 'menu-item-row' },
                    ce('span', { className: 'menu-name' }, row[1]),
                    row[2] && ce('span', { className: 'menu-price' }, `${row[2]}\u00a0₴`)
                  )
                )
              )
            );
          })
        )
      );
    }

    // ─── CONTACTS TAB ────────────────────────────────────────────────────────

    function ContactsTab() {
      const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      const isValid = form.name.trim() && form.email.trim() && form.message.trim();

      function handleChange(field) {
        return e => setForm(prev => ({ ...prev, [field]: e.target.value }));
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!isValid || submitting) return;
        setSubmitting(true);
        setTimeout(() => {
          setSubmitted(true);
          setSubmitting(false);
          setTimeout(() => {
            setSubmitted(false);
            setForm({ name: '', email: '', subject: '', message: '' });
          }, 3000);
        }, 700);
      }

      const contactCards = [
        {
          href: "https://maps.app.goo.gl/RA1kCnXyCnCtLbh46",
          icon: IconPin,
          iconColor: '#4EA8DE',
          label: 'Адреса',
          value: "вулиця Годованця, 13, Кам'янець-Подільський, 32301",
        },
        {
          href: 'tel:+380384932651',
          icon: IconPhone,
          iconColor: '#2DD4A8',
          label: 'Телефон',
          value: '(03849) 3-26-51',
        },
        {
          href: 'tel:+380681769617',
          icon: IconPhone,
          iconColor: '#2DD4A8',
          label: 'Мобільний',
          value: '(068) 176-96-17',
        },
        {
          href: 'mailto:info@kpdi.edu.ua',
          icon: IconMail,
          iconColor: '#FFA94D',
          label: 'Електронна пошта',
          value: 'info@kpdi.edu.ua',
        },
      ];

      return ce('div', { className: 'tab-content' },
        ce('div', { className: 'section-header', style: { marginTop: 0 } }, 'Контакти'),

        contactCards.map(({ href, icon: Icon, iconColor, label, value }) =>
          ce('a', {
            key: label,
            className: 'contact-card',
            href,
            target: href.startsWith('http') ? '_blank' : undefined,
            rel: href.startsWith('http') ? 'noopener noreferrer' : undefined,
          },
            ce('div', { className: 'contact-card-icon' }, ce(Icon, { color: iconColor })),
            ce('div', { className: 'contact-card-info' },
              ce('div', { className: 'contact-card-label' }, label),
              ce('div', { className: 'contact-card-value' }, value)
            ),
            ce(IconChevron)
          )
        ),

        ce('div', { className: 'section-header' }, 'Написати нам'),

        submitted
          ? ce('div', { className: 'success-card' },
              ce('div', { className: 'success-icon' }, '✓'),
              ce('div', { className: 'success-title' }, 'Відправлено!'),
              ce('div', { className: 'success-sub' }, "Ми зв'яжемось з вами найближчим часом")
            )
          : ce('form', { className: 'contact-form', onSubmit: handleSubmit },
              ce('div', { className: 'form-group' },
                ce('label', { className: 'form-label' }, "Ім'я *"),
                ce('input', {
                  className: 'form-input',
                  type: 'text',
                  value: form.name,
                  onChange: handleChange('name'),
                  placeholder: "Ваше ім'я",
                  required: true,
                })
              ),
              ce('div', { className: 'form-group' },
                ce('label', { className: 'form-label' }, 'Email *'),
                ce('input', {
                  className: 'form-input',
                  type: 'email',
                  value: form.email,
                  onChange: handleChange('email'),
                  placeholder: 'your@email.com',
                  required: true,
                })
              ),
              ce('div', { className: 'form-group' },
                ce('label', { className: 'form-label' }, 'Тема'),
                ce('input', {
                  className: 'form-input',
                  type: 'text',
                  value: form.subject,
                  onChange: handleChange('subject'),
                  placeholder: 'Тема повідомлення',
                })
              ),
              ce('div', { className: 'form-group' },
                ce('label', { className: 'form-label' }, 'Повідомлення *'),
                ce('textarea', {
                  className: 'form-input form-textarea',
                  value: form.message,
                  onChange: handleChange('message'),
                  placeholder: 'Ваше повідомлення…',
                  required: true,
                })
              ),
              ce('button', {
                type: 'submit',
                className: 'btn-primary btn-full',
                disabled: !isValid || submitting,
              }, submitting ? 'Відправляємо…' : 'Відправити')
            )
      );
    }

    // ─── BOTTOM NAV ──────────────────────────────────────────────────────────

    const NAV_ITEMS = [

          !isIOS && hasPrompt && ce('button', {
            className: 'btn-primary install-btn',
            onClick: onInstall,
          }, 'Встановити')
        ),
        ce('button', { className: 'install-close', onClick: onDismiss, 'aria-label': 'Закрити' }, '×')
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState(() => {
        try {
          const p = new URLSearchParams(window.location.search);
          const t = p.get('tab');
          const m = { home: 0, schedule: 1, moodle: 2, cafeteria: 3, contacts: 4 };
          return m[t] !== undefined ? m[t] : 0;
        } catch { return 0; }
      });

      const [installPrompt, setInstallPrompt] = useState(null);
      const [showBanner, setShowBanner]       = useState(false);

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;

      useEffect(() => {
        if (isStandalone || sessionStorage.getItem('installDismissed')) return;

        // Pick up event captured before React mounted
        if (window._installPrompt) setInstallPrompt(window._installPrompt);

        const handler = e => {
          e.preventDefault();
          window._installPrompt = e;
          setInstallPrompt(e);
        };
        window.addEventListener('beforeinstallprompt', handler);

        const timer = setTimeout(() => setShowBanner(true), 2000);

        return () => {
          window.removeEventListener('beforeinstallprompt', handler);
          clearTimeout(timer);
        };
      }, [isStandalone]);

      function handleInstall() {
        if (!installPrompt) return;
        installPrompt.prompt();
        installPrompt.userChoice.then(() => {
          setInstallPrompt(null);
          setShowBanner(false);
        });
      }

      function handleDismiss() {
        sessionStorage.setItem('installDismissed', '1');
        setShowBanner(false);
      }

      const TABS = [HomeTab, ScheduleTab, MoodleTab, CafeteriaTab, ContactsTab];
      const CurrentTab = TABS[tab] || HomeTab;

      const showInstall = !isStandalone && showBanner && (isIOS || !!installPrompt);

      return ce('div', { className: 'app' },
        ce('div', { className: 'app-content' },
          ce(CurrentTab, { onTabChange: setTab })
        ),
        showInstall && ce(InstallBanner, {
          onDismiss: handleDismiss,
          onInstall: handleInstall,
          isIOS,
          hasPrompt: !!installPrompt,
        }),
        ce(BottomNav, { active: tab, onChange: setTab })
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────────────────────

    ReactDOM.createRoot(document.getElementById('root')).render(ce(App));

  })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .catch(function (err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
